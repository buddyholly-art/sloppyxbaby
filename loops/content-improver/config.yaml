schema_version: "1.0.0"

metadata:
  name: "content-improver"
  owner: "product"
  status: "staging"
  promotion_level: "implementation"
  justification: >
    Landing and docs copy need recurring anti-slop passes. Hybrid verification
    (bloat metrics + rubric) plus optional human gate beats one-shot rewrites
    because state records rejected phrasing across iterations.

trigger:
  type: "manual"
  source: "cli"
  schedule_or_event: "editor requests copy pass on a target file"
  input_contract:
    required:
      - "target_file"

execution:
  skill_file: "skill.md"
  allowed_tools:
    - "filesystem"
    - "shell"
  forbidden_actions:
    - "add unsourced statistics"
    - "introduce banned marketing patterns"
    - "skip verifier"
  output_contract:
    required_files:
      - "state/attempts.jsonl"
    required_report_fields:
      - "bloat_score"
      - "rubric_score"
      - "banned_patterns"

verification:
  tier: 3
  criteria:
    - id: "bloat_score"
      type: "numeric"
      expected: "bloat_score <= 15"
    - id: "banned_patterns"
      type: "deterministic"
      expected: "no banned anti-slop patterns in file"
    - id: "rubric_score"
      type: "bounded_semantic"
      expected: "rubric_score >= 8 unless human_gate approves"
  verifier_command: "python3 loops/content-improver/verifier.py --file <target_file>"
  failure_response: "Log rubric evidence; escalate to human_gate on borderline scores."

state:
  path: "loops/content-improver/state"
  format: "jsonl"
  write_policy: "Append attempt with file path, metrics, rejected phrases, and next adjustment."
  retention_policy: "Keep attempts for voice consistency learning."

budgets:
  - name: "attempts"
    unit: "count"
    limit: 6
    stop_threshold: 6
  - name: "cost_usd"
    unit: "usd"
    limit: 8
    stop_threshold: 8

stop_conditions:
  - id: "max_attempts"
    condition: "attempt_count >= 6"
    action: "stop_and_report"
  - id: "human_rejected_twice"
    condition: "human_gate rejects twice"
    action: "stop_and_report"

rollback:
  strategy: "git"
  command: "git checkout -- <target_file>"