name: Loop Audit

on:
  pull_request:
    paths:
      - 'loops/**'
      - 'docs/loop-engineering/**'
      - 'scripts/loop-audit.py'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        loop:
          - loops/code-performance-optimizer
          - loops/content-improver
    steps:
      - uses: actions/checkout@v4
      - name: Repo loop standard audit
        run: python3 docs/loop-engineering/repo-loop-audit-runner.py --repo . --json
      - name: Per-loop audit ${{ matrix.loop }}
        run: python3 scripts/loop-audit.py ${{ matrix.loop }} --json